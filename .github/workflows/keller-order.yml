name: Keller-Reihenfolge ermitteln

on:
  push:
    paths:
      - '.github/workflows/keller-order.yml'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Koordinaten ermitteln und sortieren
        run: |
          mkdir -p docs
          python3 - <<'PY'
          import urllib.request, urllib.parse, json, re, time, os

          KELLER = [
              ("Erich Keller",          "https://maps.app.goo.gl/TShtQk54RFGmFxrq5"),
              ("Steinbach Keller",      "https://maps.app.goo.gl/xybAW2M7FCrLjXSD6"),
              ("Henninger Keller",      None),
              ("Entlas Keller",         "https://maps.app.goo.gl/fnGP9LrhUXz2bEHU7"),
              ("Weller Keller",         "https://maps.app.goo.gl/U7GhjaHmGopBkePX6"),
              ("Striezi Keller",        "https://maps.app.goo.gl/pyanSz4nCVPfYE2y9"),
              ("Niklas Keller",         "https://maps.app.goo.gl/wLrkQVBPu9qE3sUa7"),
              ("Hofbräu Keller",   "https://maps.app.goo.gl/XZo4s8bxv99j2TG4A"),
              ("Helbig Keller",         "https://maps.app.goo.gl/DPkQdVmpa5K4ui8p7"),
              ("Hartmanns Keller",      "https://maps.app.goo.gl/V7qqWJVwsdXsMhzo7"),
              ("Birkners Keller",       "https://maps.app.goo.gl/SzWDxseVdfp5ndb88"),
              ("Altstädter Schießhaus", "https://maps.app.goo.gl/E45s2iUza9W3HSYk8"),
              ("Hübners Keller",   "https://maps.app.goo.gl/EuKfwBFr2UC1KzvL7"),
          ]

          UA = "Mozilla/5.0 (compatible; BergwirteOrderBot/1.0; +https://github.com/ThisIsBad/erlanger-bergwirte)"

          def resolve(url):
              if not url:
                  return None, None
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": UA})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      final = r.geturl()
                      body = r.read(200000).decode("utf-8", "ignore")
                  return final, body
              except Exception as e:
                  print(f"  resolve error: {e}")
                  return None, None

          def extract_coords(final_url, body):
              for src in (final_url or "", body or ""):
                  m = re.search(r'@(-?\d+\.\d+),(-?\d+\.\d+)', src)
                  if m:
                      return float(m.group(1)), float(m.group(2)), "@lat,lng"
                  m = re.search(r'!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)', src)
                  if m:
                      return float(m.group(1)), float(m.group(2)), "!3d!4d"
                  m = re.search(r'(-?\d+\.\d+),(-?\d+\.\d+)/data', src)
                  if m:
                      return float(m.group(1)), float(m.group(2)), "path"
              return None

          def nominatim(name):
              q = urllib.parse.quote(f"{name}, Erlangen, Bayern, Deutschland")
              url = f"https://nominatim.openstreetmap.org/search?q={q}&format=json&limit=1"
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": UA})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                  if data:
                      return float(data[0]["lat"]), float(data[0]["lon"]), "Nominatim"
              except Exception as e:
                  print(f"  nominatim error: {e}")
              return None

          results = []
          for name, gurl in KELLER:
              print(f"--- {name} ---")
              coords = None
              if gurl:
                  final, body = resolve(gurl)
                  if final:
                      print(f"  final URL: {final[:120]}")
                  coords = extract_coords(final, body)
              if coords is None:
                  print(f"  Fallback Nominatim")
                  coords = nominatim(name)
                  time.sleep(1.1)
              if coords:
                  lat, lon, src = coords
                  print(f"  -> ({lat}, {lon}) via {src}")
                  results.append((name, lat, lon, src))
              else:
                  print("  -> NICHT GEFUNDEN")
                  results.append((name, None, None, "nicht gefunden"))

          ordered = sorted(results, key=lambda r: (r[2] if r[2] is not None else 9999))

          os.makedirs("docs", exist_ok=True)
          with open("docs/keller-reihenfolge.md", "w", encoding="utf-8") as f:
              f.write("# Keller-Reihenfolge: West nach Ost\n\n")
              f.write(f"Automatisch erzeugt am {time.strftime('%Y-%m-%d %H:%M UTC')} aus den Maps-Links auf bergwirte.de "
                      f"plus Nominatim-Fallback. Sortiert nach Längengrad (kleiner = westlicher).\n\n")
              f.write("| # | Keller | Längengrad (Ost) | Breitengrad (Nord) | Quelle |\n")
              f.write("|---|--------|------------------|--------------------|--------|\n")
              for i, (name, lat, lon, src) in enumerate(ordered, 1):
                  if lon is not None:
                      f.write(f"| {i} | {name} | {lon:.5f} | {lat:.5f} | {src} |\n")
                  else:
                      f.write(f"| {i} | {name} | — | — | {src} |\n")
              f.write("\n## Nur die Reihenfolge\n\n")
              for i, (name, lat, lon, src) in enumerate(ordered, 1):
                  f.write(f"{i}. {name}\n")

          print("\n=== West nach Ost ===")
          for i, (name, lat, lon, src) in enumerate(ordered, 1):
              print(f"{i:2}. {name}")
          PY

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/keller-reihenfolge.md
          if git diff --staged --quiet; then
            echo "Nichts zu committen."
            exit 0
          fi
          git commit -m "Add keller order west to east"
          git push
